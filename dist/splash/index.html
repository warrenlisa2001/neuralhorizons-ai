<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Horizons AI — Agentic AI Consulting UAE & MENA</title>
<meta name="description" content="Your business has gaps. Revenue leaks through them. We close them with agentic AI. Free instant AI audit — 2 minutes, no cost.">
<link rel="canonical" href="https://www.neuralhorizonsai.com/splash/">
<meta name="robots" content="noindex,follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;}
  body{
    background:#05050A;color:#fff;font-family:'Manrope',-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    overflow:hidden;
  }
  .splash{position:relative;width:100vw;height:100vh;height:100dvh;overflow:hidden;display:flex;align-items:center;justify-content:center;}
  .splash-video-fx{position:absolute;inset:0;overflow:hidden;z-index:0;}
  .splash-video-wrap{position:absolute;inset:0;overflow:hidden;}
  .splash-bg-video{position:absolute;top:50%;left:50%;width:177.77vh;min-width:100%;height:56.25vw;min-height:100%;transform:translate(-50%,-50%);border:0;}
  .splash-scrim{position:absolute;inset:0;background:linear-gradient(180deg, rgba(5,5,10,.5) 0%, rgba(5,5,10,.6) 50%, rgba(5,5,10,.78) 100%);}
  .splash-content{position:relative;z-index:2;text-align:center;padding:24px;max-width:720px;}
  .splash-logo{width:min(72vw,420px);height:auto;display:block;margin:0 auto 28px;filter:drop-shadow(0 6px 30px rgba(0,0,0,.5));}
  .splash-tagline{
    font-size:clamp(1.15rem,3vw,1.6rem);font-weight:700;line-height:1.4;color:#fff;
    margin-bottom:8px;letter-spacing:-0.01em;
  }
  .splash-tagline .accent{background:linear-gradient(90deg,#05C793,#1E90FF,#7C3AED);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;}
  .splash-sub{font-size:clamp(0.9rem,2vw,1.05rem);color:#BCBFCC;margin-bottom:34px;font-weight:500;}
  .splash-urgency{
    display:inline-flex;align-items:center;gap:8px;background:rgba(255,62,92,.12);border:1px solid rgba(255,92,92,.4);
    border-radius:999px;padding:6px 16px;margin-bottom:24px;font-size:0.78rem;font-weight:800;letter-spacing:.06em;
    text-transform:uppercase;color:#FF8080;
  }
  .splash-urgency .pulse-dot{width:7px;height:7px;border-radius:50%;background:#FF5C5C;animation:urgentPulse 1.4s infinite;flex-shrink:0;}
  @keyframes urgentPulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.4;transform:scale(1.5);}}
  .splash-cta{
    display:inline-flex;align-items:center;gap:10px;background:linear-gradient(135deg,#05C793,#1E90FF);
    color:#04110c;font-weight:800;font-size:clamp(1rem,2.4vw,1.15rem);padding:18px 38px;border-radius:999px;
    box-shadow:0 12px 40px rgba(5,199,147,.35);transition:transform .25s ease, box-shadow .25s ease;
    animation:ctaBreathe 2.4s ease-in-out infinite;
  }
  .splash-cta:hover{transform:scale(1.04) translateY(-2px);box-shadow:0 16px 50px rgba(5,199,147,.5);}
  @keyframes ctaBreathe{0%,100%{box-shadow:0 12px 40px rgba(5,199,147,.35);}50%{box-shadow:0 12px 52px rgba(5,199,147,.55);}}
  .splash-fine{margin-top:16px;font-size:0.8rem;color:#8A93A8;}
  .splash-skip{position:absolute;bottom:24px;left:50%;transform:translateX(-50%);z-index:3;font-size:0.78rem;color:rgba(255,255,255,.55);text-decoration:underline;text-underline-offset:3px;}
  .splash-sound{position:absolute;right:20px;bottom:20px;z-index:5;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.25);color:#fff;font-size:11px;font-weight:600;padding:7px 14px;border-radius:100px;cursor:pointer;backdrop-filter:blur(6px);font-family:inherit;}
  .splash-sound:hover{border-color:#05C793;}
</style>
</head>
<body>

<div class="splash">
  <div class="splash-video-fx" aria-hidden="true">
    <div class="splash-video-wrap">
      <iframe id="splashBgVideo" class="splash-bg-video" src="https://www.youtube.com/embed/Ynoh37vsZAo?start=65&autoplay=1&mute=0&loop=1&playlist=Ynoh37vsZAo&controls=0&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3&enablejsapi=1&playsinline=1" title="Background video" frameborder="0" allow="autoplay; encrypted-media" referrerpolicy="strict-origin-when-cross-origin"></iframe>
    </div>
    <div class="splash-scrim"></div>
  </div>

  <button class="splash-sound" id="splashSoundToggle" type="button">Mute</button>

  <div class="splash-content">
    <img class="splash-logo" src="/images/logo-lockup-white.svg" alt="Neural Horizons AI">
    <p class="splash-tagline">Your business has gaps. <span class="accent">Revenue leaks through them.</span></p>
    <p class="splash-sub">We close them with agentic AI — UAE &amp; MENA's specialist implementation consultancy.</p>
    <div class="splash-urgency"><span class="pulse-dot"></span> Free AI Audit — Instant Report</div>
    <br>
    <a class="splash-cta" href="/ai-audit">⚡ Take Your Free AI Audit Now</a>
    <p class="splash-fine">2 minutes. Zero cost. Your personalised report, instantly.</p>
  </div>

  <a class="splash-skip" href="/">Skip to site →</a>
</div>

<script>
(function(){
  var videoFrame = document.getElementById('splashBgVideo');
  var soundBtn = document.getElementById('splashSoundToggle');
  var muted = false;
  if (videoFrame) {
    var kickPlay = function(){
      try {
        videoFrame.contentWindow.postMessage(JSON.stringify({event:'command', func:'unMute', args:[]}), '*');
        videoFrame.contentWindow.postMessage(JSON.stringify({event:'command', func:'playVideo', args:[]}), '*');
      } catch (e) {}
    };
    videoFrame.addEventListener('load', function(){
      kickPlay();
      setTimeout(kickPlay, 600);
      setTimeout(kickPlay, 1500);
      setTimeout(kickPlay, 3000);
    });
    // Browsers that block unmuted autoplay will still be silent until a gesture —
    // the first click/scroll/keypress forces sound on as a fallback.
    var forceOnGesture = function(){
      if (!muted) kickPlay();
    };
    document.addEventListener('click', forceOnGesture, {once:true});
    document.addEventListener('scroll', forceOnGesture, {once:true});
    document.addEventListener('keydown', forceOnGesture, {once:true});
  }
  if (soundBtn && videoFrame) {
    soundBtn.addEventListener('click', function(){
      muted = !muted;
      videoFrame.contentWindow.postMessage(JSON.stringify({event:'command', func: muted ? 'mute' : 'unMute', args:[]}), '*');
      soundBtn.textContent = muted ? 'Unmute' : 'Mute';
    });
  }
})();
</script>
</body>
</html>
